; =============================================================================
; StreamDeck DIY — Configuration PlatformIO
; Cible : ESP32-S3-DevKitC-1 N16R8
; Communication PC : USB CDC natif (port USB gauche de la carte)
; =============================================================================

[env:esp32s3]
platform                  = espressif32
board                     = esp32-s3-devkitc-1
framework                 = arduino

; --- Communication série vers le PC (USB CDC natif)
build_flags               =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

; --- Vitesse du moniteur série
monitor_speed             = 115200
monitor_filters           = esp32_exception_decoder

; --- Port de flash (adapter si besoin)
; upload_port             = COM3

; --- Bibliothèques nécessaires
lib_deps                  =
    espressif/arduino-esp32
